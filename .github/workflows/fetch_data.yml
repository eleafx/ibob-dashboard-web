name: Fetch Data

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 2am UTC (10am HKT) — IMMD weekly
    - cron: '0 3 1 * *'   # 1st of every month 3am UTC — PartnerNet monthly
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-data-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch_immd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas urllib3

      - name: Fetch IMMD CSV
        run: python scraper.py

      - name: Commit updated IMMD data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No IMMD changes to commit"
            exit 0
          fi
          git commit -m "Auto-update: IMMD data $(date +'%Y-%m-%d')"
          BRANCH="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH"
            git push origin "HEAD:$BRANCH" && exit 0
            echo "Push failed, retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
          echo "Push failed after retries"
          exit 1

  fetch_partnernet:
    runs-on: ubuntu-latest
    needs: fetch_immd
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 1 * *'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch PartnerNet visitor data
        env:
          PARTNERNET_USER: ${{ secrets.PARTNERNET_USER }}
          PARTNERNET_PASS: ${{ secrets.PARTNERNET_PASS }}
        run: |
          YEAR=$(date +%Y)
          PRIOR=$((YEAR - 1))
          OUT=data/international_visitors.csv

          python international_visitors_scraper.py --year 2024 --output-csv "$OUT"
          python validate_intl_csv.py "$OUT" --year 2024

          python international_visitors_scraper.py --year $PRIOR --output-csv "$OUT"
          python international_visitors_scraper.py --year $YEAR --output-csv "$OUT"
          python validate_intl_csv.py "$OUT" --year $PRIOR
          python validate_intl_csv.py "$OUT" --year $YEAR --min-months 1

      - name: Commit updated visitor data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/international_visitors.csv
          if git diff --cached --quiet; then
            echo "No visitor data changes to commit"
            exit 0
          fi
          git commit -m "Auto-update: PartnerNet visitor data $(date +'%Y-%m-%d')"
          BRANCH="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH"
            git push origin "HEAD:$BRANCH" && exit 0
            echo "Push failed, retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
          echo "Push failed after retries"
          exit 1
